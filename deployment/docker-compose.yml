# deployment/docker-compose.yml
version: "3.9"

services:
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-assignment-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assignments
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-assignment-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../deployment/Dockerfile.backend
    container_name: ai-assignment-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/assignments
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../handwriting-engine:/app/handwriting-engine
      - fonts_data:/usr/share/fonts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: ../deployment/Dockerfile.backend
    container_name: ai-assignment-celery
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2 -Q assignments,notebooks
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/assignments
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - ../backend/.env
    depends_on:
      - backend
    volumes:
      - ../handwriting-engine:/app/handwriting-engine
      - fonts_data:/usr/share/fonts

  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deployment/Dockerfile.frontend
    container_name: ai-assignment-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    env_file:
      - ../frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  fonts_data:
